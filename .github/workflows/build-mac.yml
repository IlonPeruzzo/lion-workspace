name: Build macOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG (Universal)
        run: npx electron-builder --mac dmg --x64 --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Lion-Workspace-macOS
          path: |
            dist/*.dmg
          retention-days: 90

      - name: Upload Plugin
        uses: actions/upload-artifact@v4
        with:
          name: Premiere-Plugin-macOS
          path: premiere-plugin/
          retention-days: 90
