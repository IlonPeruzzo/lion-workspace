<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>LION SEARCH</title>
<style>
    :root {
        --bg: rgba(22,22,24,0.97);
        --bg-results: #0d0d0e;
        --text: #e8e8e8;
        --text2: #888;
        --text3: #555;
        --border: rgba(255,255,255,0.08);
        --selected: rgba(255,255,255,0.12);
        --hover: rgba(255,255,255,0.05);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
        background:transparent;
        color:var(--text);
        font-family:'Inter','Segoe UI',sans-serif;
        font-size:14px;
        -webkit-font-smoothing:antialiased;
        overflow:hidden;
        height:100%;
        user-select:none;
    }
    body { -webkit-app-region: drag; }

    .palette {
        background:var(--bg);
        backdrop-filter:blur(18px);
        -webkit-backdrop-filter:blur(18px);
        border-radius:6px;
        margin:4px;
        height:calc(100% - 8px);
        display:flex;
        flex-direction:column;
        overflow:hidden;
        box-shadow:0 30px 70px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05);
    }

    /* Topbar */
    .topbar {
        height:24px;
        display:flex;
        align-items:center;
        justify-content:flex-end;
        padding:0 4px;
        background:rgba(255,255,255,0.04);
        border-bottom:1px solid var(--border);
        flex-shrink:0;
    }
    .close-btn {
        width:22px; height:18px;
        display:flex; align-items:center; justify-content:center;
        background:transparent; border:none;
        color:var(--text2); cursor:pointer;
        border-radius:3px;
        -webkit-app-region: no-drag;
        transition:all .12s;
    }
    .close-btn:hover { background:rgba(255,255,255,0.08); color:var(--text); }
    .close-btn svg { width:10px; height:10px; }

    /* Search area */
    .search-area {
        position:relative;
        padding:18px 22px;
        flex-shrink:0;
        -webkit-app-region: no-drag;
        min-height:54px;
        display:flex;
        align-items:center;
        justify-content:center;
    }
    /* Hero — só visível quando não tá digitando */
    .hero {
        font-size:1.0rem;
        font-weight:300;
        letter-spacing:.45em;
        color:var(--text);
        text-align:center;
        text-transform:uppercase;
        font-family:'Inter','Helvetica Neue',sans-serif;
        padding-right:.45em; /* compensa letter-spacing final pra centrar */
        white-space:nowrap;
        opacity:.95;
    }
    .palette.typing .hero { display:none; }
    .typed-text {
        display:none;
        font-size:1.05rem;
        font-weight:400;
        color:var(--text);
        font-family:inherit;
        width:100%;
        line-height:1.4;
    }
    .palette.typing .typed-text { display:block; }
    .typed-text .caret {
        display:inline-block;
        width:1.5px;
        height:1em;
        background:var(--text);
        margin-left:1px;
        vertical-align:-2px;
        animation:blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity:0; } }

    input.hidden-search {
        position:absolute; opacity:0; pointer-events:none;
        width:1px; height:1px;
    }

    /* Results */
    .results-wrap {
        flex:1;
        overflow-y:auto;
        background:var(--bg-results);
        border-top:1px solid var(--border);
        -webkit-app-region: no-drag;  /* CRÍTICO: senão clicks viram drag */
    }
    .results-wrap * { -webkit-app-region: no-drag; }
    .palette:not(.typing) .results-wrap { display:none; }
    /* Modo "Fixados": mostra a lista de favoritos mesmo sem digitar (ao abrir a paleta) */
    .palette.pins .results-wrap { display:block; }
    /* Menu de contexto (botao direito) — fixar/desafixar */
    .ctx-menu {
        position:fixed; z-index:100; min-width:158px;
        background:#1c1c1f; border:1px solid rgba(255,255,255,.1); border-radius:7px;
        box-shadow:0 12px 32px rgba(0,0,0,.6); padding:4px; -webkit-app-region:no-drag;
        font-size:.82rem; color:var(--text);
    }
    .ctx-menu .ctx-item {
        display:flex; align-items:center; gap:8px; padding:7px 11px; border-radius:5px; cursor:pointer; white-space:nowrap;
    }
    .ctx-menu .ctx-item:hover { background:var(--hover); }
    .ctx-menu .ctx-item svg { width:13px; height:13px; flex-shrink:0; }
    /* Estrela de fixado na linha + header da categoria Fixados */
    .item .pin-star { flex-shrink:0; margin-right:7px; color:#bef264; display:inline-flex; }
    .item .pin-star svg { width:12px; height:12px; }
    .cat-header.pinned { color:#bef264; }
    .results-wrap::-webkit-scrollbar { width:5px; }
    .results-wrap::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:3px; }

    .cat-header {
        font-size:.6rem;
        font-weight:600;
        letter-spacing:1.4px;
        text-transform:uppercase;
        color:var(--text2);
        background:#18181a;
        padding:5px 22px;
        border-top:1px solid rgba(255,255,255,0.04);
    }
    .cat-header:first-child { border-top:none; }

    .item {
        display:flex; align-items:center;
        padding:8px 22px;
        cursor:pointer;
        font-size:.88rem;
        color:var(--text);
        transition:background .06s;
        position:relative;
    }
    .item:hover { background:var(--hover); }
    .item.selected { background:var(--selected); }
    .item.selected::after {
        content:'';
        position:absolute;
        right:18px; top:50%;
        width:5px; height:5px;
        border-right:1.5px solid var(--text2);
        border-top:1.5px solid var(--text2);
        transform:translateY(-50%) rotate(45deg);
    }
    .item-name {
        flex:1; min-width:0;
        white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .item-cat {
        font-size:.66rem;
        color:var(--text3);
        margin-left:14px;
        white-space:nowrap;
    }

    .empty {
        text-align:center;
        padding:24px 18px;
        font-size:.74rem;
        color:var(--text3);
        line-height:1.6;
    }
    .empty.loading { color:var(--text2); }
    .empty.error { color:#fca5a5; }
    .empty kbd {
        display:inline-block; padding:1px 5px;
        background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.06);
        border-radius:3px; font-family:ui-monospace,monospace;
        font-size:.66rem; color:var(--text2);
    }
    .spinner {
        display:inline-block; width:12px; height:12px;
        border:2px solid rgba(255,255,255,0.1);
        border-top-color:var(--text);
        border-radius:50%;
        animation:spin .7s linear infinite;
        margin-right:6px;
        vertical-align:-2px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Loading visual estendido */
    .load-wrap {
        padding:34px 20px 28px;
        text-align:center;
    }
    .load-pulse {
        display:inline-flex; align-items:center; gap:7px;
        margin-bottom:18px;
    }
    .load-pulse span {
        width:9px; height:9px;
        background:#bef264; border-radius:50%;
        opacity:0.3;
        animation:loadPulse 1.4s ease-in-out infinite;
    }
    .load-pulse span:nth-child(2) { animation-delay:.18s; }
    .load-pulse span:nth-child(3) { animation-delay:.36s; }
    @keyframes loadPulse {
        0%, 80%, 100% { opacity:0.25; transform:scale(0.85); }
        40% { opacity:1; transform:scale(1.1); }
    }
    .load-title {
        font-size:.92rem; font-weight:500; color:var(--text);
        margin-bottom:4px;
        letter-spacing:.3px;
    }
    .load-sub {
        font-size:.7rem; color:var(--text3);
        line-height:1.55; max-width:340px; margin:0 auto;
    }
    .load-progress {
        margin:18px auto 0; max-width:240px; height:3px;
        background:rgba(255,255,255,0.05); border-radius:2px; overflow:hidden;
        position:relative;
    }
    .load-progress::before {
        content:''; position:absolute;
        left:0; top:0; bottom:0; width:35%;
        background:linear-gradient(90deg, transparent, #bef264, transparent);
        animation:loadBar 1.6s ease-in-out infinite;
    }
    @keyframes loadBar {
        0% { left:-35%; } 100% { left:100%; }
    }
    .load-stage {
        margin-top:14px;
        font-size:.62rem; color:var(--text3);
        letter-spacing:.5px; text-transform:uppercase;
    }
    .load-stage.warn { color:#fbbf24; }

    /* Catalog status badge — bottom corner when not typing */
    .catalog-badge {
        position:absolute; bottom:6px; left:50%;
        transform:translateX(-50%);
        font-size:.55rem; color:var(--text3);
        letter-spacing:.5px; text-transform:uppercase;
        white-space:nowrap;
        opacity:.7;
        pointer-events:none;
    }
    .catalog-badge.loading { color:var(--text2); }
    .catalog-badge.error { color:#fca5a5; opacity:1; }
    .catalog-badge.ready { color:#86efac; }
    .palette.typing .catalog-badge { display:none; }

    .toast {
        position:fixed; bottom:14px; left:50%;
        transform:translateX(-50%) translateY(8px);
        background:rgba(20,20,20,0.96); border:1px solid var(--border);
        border-radius:5px; padding:6px 12px; font-size:.7rem;
        color:var(--text); opacity:0; pointer-events:none;
        transition:all .25s;
        max-width:80%; text-align:center;
        z-index:10;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast.success { color:#86efac; }
    .toast.error { color:#fca5a5; border-color:rgba(239,68,68,0.4); }
</style>
</head>
<body>
<div class="palette" id="palette">
    <div class="topbar">
        <button class="close-btn" id="closeBtn" title="Fechar (Esc)">
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
                <line x1="2.5" y1="2.5" x2="9.5" y2="9.5"/>
                <line x1="9.5" y1="2.5" x2="2.5" y2="9.5"/>
            </svg>
        </button>
    </div>

    <div class="search-area">
        <div class="hero">LION SEARCH</div>
        <div class="typed-text" id="typedText"><span class="caret"></span></div>
        <input type="text" class="hidden-search" id="searchInput" autofocus spellcheck="false">
        <div class="catalog-badge loading" id="catalogBadge"></div>
    </div>

    <div class="results-wrap" id="results">
        <div class="empty">Digite pra buscar</div>
    </div>

    <div class="toast" id="toast"></div>
</div>

<script>
'use strict';

const { ipcRenderer } = require('electron');

const $palette = document.getElementById('palette');
const $input = document.getElementById('searchInput');
const $typed = document.getElementById('typedText');
const $results = document.getElementById('results');
const $toast = document.getElementById('toast');
const $closeBtn = document.getElementById('closeBtn');
const $badge = document.getElementById('catalogBadge');

// Alturas — empty=compacto, typing=expande pra mostrar lista
const SIZE_EMPTY = { w: 440, h: 88 };
const SIZE_TYPING = { w: 440, h: 440 };

let allItems = [];
// Fixados (favoritos) — persistidos no localStorage por kind|matchName
let pinnedKeys = (function(){ try { return new Set(JSON.parse(localStorage.getItem('lw_ls_pins') || '[]')); } catch(e) { return new Set(); } })();
function pinKey(it){ return (it.kind || '') + '|' + (it.matchName || it.name || ''); }
function isPinned(it){ return pinnedKeys.has(pinKey(it)); }
function savePins(){ try { localStorage.setItem('lw_ls_pins', JSON.stringify(Array.from(pinnedKeys))); } catch(e) {} }
function pinnedItems(){
    // Resolve as chaves fixadas pros itens reais do catalogo, na ORDEM de fixacao.
    // Itens cujo preset/efeito nao existe mais somem sozinhos (self-cleaning).
    const out = [];
    pinnedKeys.forEach(k => { const it = allItems.find(x => pinKey(x) === k); if (it) out.push(it); });
    return out;
}
function togglePin(it){
    const k = pinKey(it);
    if (pinnedKeys.has(k)) pinnedKeys.delete(k); else pinnedKeys.add(k);
    savePins();
    if ($input.value.trim()) filter(); else _renderPinsEmpty();
}
let filtered = [];
let flatList = [];
let selectedIdx = 0;
let busy = false;
let booted = false;
let bootError = null;

function close() { ipcRenderer.send('lion-search:close'); }
$closeBtn.onclick = close;

// Listener pra reset state quando janela é re-mostrada (pré-criada + hide/show)
ipcRenderer.on('lion-search:reset', () => {
    try {
        $input.value = '';
        $typed.innerHTML = '<span class="caret"></span>';
        selectedIdx = 0;
        flatList = [];
        filtered = [];
        busy = false;
        _lastTyping = null;
        $palette.classList.remove('typing');
        // Refetch context (selectionType pode ter mudado entre opens)
        try { fetchContext(); } catch(e) {}
        // Usa CACHE (não força refresh — TTL de 30s cobre renames recentes).
        // setInterval em background ainda re-scan periodicamente.
        ipcRenderer.invoke('lion-search:list-effects', { forceRefresh: false }).then(r => _applyResult(r, false)).catch(()=>{});
        // Re-foca o input
        setTimeout(() => { try { $input.focus(); } catch(e) {} }, 30);
        // Mostra os fixados imediatamente ao abrir (se o catalogo ja estiver em memoria)
        _renderPinsEmpty();
    } catch(e) { console.warn('reset err', e); }
});

function ensureFocus() {
    // preventScroll: focar o input escondido SCROLLAVA a pagina -> o listener de scroll
    // (que fecha o menu de contexto) matava o menu no MOUSEDOWN, antes do click completar
    // -> "Fixar" nunca executava. (Achado com trace de eventos reais.)
    setTimeout(() => { try { $input.focus({ preventScroll: true }); } catch(e) { try { $input.focus(); } catch(e2) {} } }, 0);
}
ensureFocus();
document.addEventListener('mousedown', (e) => {
    // clicar no menu de contexto nao deve roubar foco/scrollar — deixa o click dele viver
    if (!e.target.closest('.close-btn') && !e.target.closest('.ctx-menu')) ensureFocus();
});

function showToast(msg, kind) {
    $toast.textContent = msg;
    $toast.className = 'toast show' + (kind ? ' ' + kind : '');
    setTimeout(() => $toast.classList.remove('show'), 2200);
}

function updateBadge() {
    if (!booted && !bootError) {
        if (bootAttempts <= 1) $badge.textContent = '⟳ procurando catálogo…';
        else if (bootAttempts === 2) $badge.textContent = '⟳ tentando de novo…';
        else $badge.textContent = '⚠ aguardando plugin…';
        $badge.className = 'catalog-badge loading';
    } else if (bootError) {
        const short = bootError.length > 90 ? bootError.slice(0, 90) + '…' : bootError;
        $badge.textContent = '⚠ ' + short;
        $badge.className = 'catalog-badge error';
        $badge.title = bootError + (lastDebug ? ' · debug=' + lastDebug : '');
    } else if (allItems.length === 0) {
        $badge.textContent = '⚠ catálogo vazio';
        $badge.className = 'catalog-badge error';
    } else {
        $badge.textContent = allItems.length + ' itens';
        $badge.className = 'catalog-badge ready';
        $badge.title = lastDebug || '';
    }
}

function resizeTo(typing) {
    const s = typing ? SIZE_TYPING : SIZE_EMPTY;
    ipcRenderer.send('lion-search:resize', s);
}

const CAT_LABEL = {
    'video-fx':     'Video Effects',
    'audio-fx':     'Audio Effects',
    'video-tx':     'Video Transitions',
    'audio-tx':     'Audio Transitions',
    'preset':       'Presets',
    'audio-source': 'Sound Effects (Project)',
};
const CAT_ORDER = ['audio-source', 'video-fx', 'audio-fx', 'preset', 'video-tx', 'audio-tx'];

// Selection context — quando há clip selecionado, prioriza items compatíveis
let selCtx = { selectionType: 'none', videoSelected: 0, audioSelected: 0, hasSequence: false };

function isCompatibleWithSelection(item) {
    if (selCtx.selectionType === 'none' || selCtx.selectionType === 'mixed') return true;
    // Audio source: sempre compat (independente de seleção, vai pro playhead)
    if (item.kind === 'audio-source') return true;
    if (selCtx.selectionType === 'video') {
        if (item.kind === 'video-fx' || item.kind === 'video-tx') return true;
        if (item.kind === 'preset') return !item.audioOnly;
        return false;
    }
    if (selCtx.selectionType === 'audio') {
        if (item.kind === 'audio-fx' || item.kind === 'audio-tx') return true;
        if (item.kind === 'preset') return !item.videoOnly;
        return false;
    }
    return true;
}

// Normaliza string pra busca: minúsculo + trata _ e - como espaço
// (assim "kiply pov" casa com "kiply_pov", "kiply-pov", "Kiply POV")
function _normSearch(s) {
    if (!s) return '';
    return String(s).toLowerCase().replace(/[_\-]+/g, ' ').replace(/\s+/g, ' ').trim();
}

function score(item, query) {
    if (!query) return 1;
    const q = _normSearch(query);
    const name = _normSearch(item.name || '');
    const cat = _normSearch(item.category || '');
    if (name === q) return 1000;
    if (name.startsWith(q)) return 500 - (name.length - q.length);
    if (name.includes(q)) return 200;
    if (cat.includes(q)) return 50;
    let pos = 0;
    for (let c of q) { pos = name.indexOf(c, pos); if (pos < 0) return 0; pos++; }
    return 10;
}

let _lastTyping = null;
// Sem query: mostra os FIXADOS (favoritos) no topo, ou o hero se nao houver nenhum.
function _renderPinsEmpty() {
    const pins = booted ? pinnedItems() : [];
    if (!pins.length) {
        $palette.classList.remove('pins');
        filtered = []; flatList = []; selectedIdx = 0;
        try { $results.innerHTML = '<div class="empty">Digite pra buscar</div>'; } catch(e) {}
        resizeTo(false);
        return;
    }
    $palette.classList.add('pins');
    filtered = [{ catKey: 'pinned', catLabel: '★ Fixados', items: pins }];
    flatList = pins.slice();
    selectedIdx = 0;
    // Altura sob medida pro numero de fixados (teto 440)
    const h = Math.min(440, 112 + pins.length * 40);
    ipcRenderer.send('lion-search:resize', { w: 440, h });
    render();
}
function filter() {
    const q = $input.value.trim();
    $typed.innerHTML = escHtml(q) + '<span class="caret"></span>';
    const willType = q.length > 0;
    $palette.classList.toggle('typing', willType);
    if (!willType) {
        // Estado vazio: fixados (se houver) ou hero. _renderPinsEmpty cuida do resize.
        $palette.classList.remove('typing');
        _lastTyping = false;
        _renderPinsEmpty();
        return;
    }
    $palette.classList.remove('pins');
    // Força resize sempre que o estado muda (não confia no classList check)
    if (willType !== _lastTyping) {
        _lastTyping = willType;
        resizeTo(willType);
    }

    const byCat = {};
    const pinnedMatched = [];
    for (const it of allItems) {
        const pinned = isPinned(it);
        // Fixado ignora o filtro de compatibilidade de selecao — atalho SEMPRE aparece
        // (coerente com o modo vazio, que tambem nao filtra por compat)
        if (!pinned && !isCompatibleWithSelection(it)) continue;
        const s = score(it, q);
        if (s > 0) {
            // Fixados que casam com a busca vao pra categoria "★ Fixados" no topo
            if (pinned) { pinnedMatched.push({ it, s }); continue; }
            const k = it.kind || 'preset';
            if (!byCat[k]) byCat[k] = [];
            byCat[k].push({ it, s });
        }
    }
    filtered = [];
    flatList = [];
    if (pinnedMatched.length) {
        pinnedMatched.sort((a, b) => b.s - a.s);
        const pit = pinnedMatched.slice(0, 50).map(x => x.it);
        filtered.push({ catKey: 'pinned', catLabel: '★ Fixados', items: pit });
        for (const it of pit) flatList.push(it);
    }
    for (const k of CAT_ORDER) {
        if (!byCat[k]) continue;
        byCat[k].sort((a, b) => b.s - a.s);
        const items = byCat[k].slice(0, 50).map(x => x.it);
        filtered.push({ catKey: k, catLabel: CAT_LABEL[k] || k, items });
        for (const it of items) flatList.push(it);
    }
    selectedIdx = 0;
    render();
}

function render() {
    const q = $input.value.trim();
    if (!q && !flatList.length) { return; } // vazio SEM fixados = só hero

    function debugBlock() {
        let html = '';
        if (lastJsxError) html += '<br><br><span style="color:#fca5a5;font-family:monospace;font-size:.6rem;word-break:break-all">JSX: ' + escHtml(lastJsxError) + '</span>';
        if (lastDebug) html += '<br><br><span style="opacity:.6;font-family:monospace;font-size:.6rem;word-break:break-all">debug: ' + escHtml(lastDebug) + '</span>';
        if (!lastJsxError && !lastDebug) html += '<br><br><span style="opacity:.5;font-size:.6rem">Sem debug — plugin pode estar usando código antigo. Reinicie o Premiere completamente.</span>';
        return html;
    }

    if (!booted && !bootError) {
        let title, sub, stage, stageClass = '';
        if (bootAttempts <= 1) {
            title = 'Procurando catálogo';
            sub = 'Buscando efeitos, presets e áudios do Premiere…';
            stage = '<span class="spinner"></span>Conectando ao plugin';
        } else if (bootAttempts === 2) {
            title = 'Quase lá';
            sub = 'Plugin demorando pra responder. Continue editando, tentamos de novo automaticamente.';
            stage = '<span class="spinner"></span>Retry ' + bootAttempts + '/3';
        } else {
            title = 'Plugin não respondeu';
            sub = 'Abra o <strong>Premiere</strong> com o plugin <strong>Lion Workspace</strong> ativo (Window → Extensions) e faça login. Vou tentar de novo automaticamente.';
            stage = '⚠ Aguardando plugin';
            stageClass = 'warn';
        }
        $results.innerHTML =
            '<div class="load-wrap">' +
              '<div class="load-pulse"><span></span><span></span><span></span></div>' +
              '<div class="load-title">' + title + '</div>' +
              '<div class="load-sub">' + sub + '</div>' +
              '<div class="load-progress"></div>' +
              '<div class="load-stage ' + stageClass + '">' + stage + '</div>' +
            '</div>';
        return;
    }
    if (bootError) {
        $results.innerHTML = '<div class="empty error">⚠ ' + escHtml(bootError) + '<br><br>Verifique se o <strong>plugin Lion Workspace</strong> está aberto no Premiere e logado.' + debugBlock() + '</div>';
        return;
    }
    if (allItems.length === 0) {
        $results.innerHTML = '<div class="empty error">Catálogo vazio.<br><br>Abra o <strong>plugin Lion Workspace</strong> no Premiere (Window → Extensions), faça login, e tenha um <strong>projeto com sequência aberta</strong>.' + debugBlock() + '</div>';
        return;
    }
    if (!flatList.length) {
        $results.innerHTML = '<div class="empty">Nada encontrado pra "' + escHtml(q) + '"</div>';
        return;
    }
    let html = '';
    let idxCounter = 0;
    const STAR = '<span class="pin-star"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 18.9 5.9 21.4l1.4-6.8L2.2 9.9l6.9-.8z"/></svg></span>';
    for (const grp of filtered) {
        const isPinCat = grp.catKey === 'pinned';
        html += '<div class="cat-header' + (isPinCat ? ' pinned' : '') + '">' + escHtml(grp.catLabel) + '</div>';
        for (const it of grp.items) {
            const isSel = idxCounter === selectedIdx;
            html += '<div class="item' + (isSel ? ' selected' : '') + '" data-idx="' + idxCounter + '">';
            if (isPinned(it)) html += STAR;
            html += '<span class="item-name">' + escHtml(it.name) + '</span>';
            if (it.category) html += '<span class="item-cat">' + escHtml(it.category) + '</span>';
            html += '</div>';
            idxCounter++;
        }
    }
    $results.innerHTML = html;
    const sel = $results.querySelector('.item.selected');
    if (sel) sel.scrollIntoView({ block: 'nearest' });
}

function escHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;',
    }[c]));
}

$results.addEventListener('click', (e) => {
    const item = e.target.closest('.item');
    if (!item) return;
    selectedIdx = parseInt(item.dataset.idx);
    apply();
});

// ── Menu de contexto (botao direito) — Fixar / Desafixar ──
let _ctxEl = null;
function _hideCtx() { if (_ctxEl) { try { _ctxEl.remove(); } catch(e) {} _ctxEl = null; } }
const _STAR_FILL = '<svg viewBox="0 0 24 24" fill="#bef264"><path d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 18.9 5.9 21.4l1.4-6.8L2.2 9.9l6.9-.8z"/></svg>';
const _STAR_OFF = '<svg viewBox="0 0 24 24" fill="none" stroke="#a1a1aa" stroke-width="2" stroke-linejoin="round"><path d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 18.9 5.9 21.4l1.4-6.8L2.2 9.9l6.9-.8z"/></svg>';
$results.addEventListener('contextmenu', (e) => {
    const row = e.target.closest('.item');
    if (!row) return;
    e.preventDefault();
    const it = flatList[parseInt(row.dataset.idx)];
    if (!it) return;
    _hideCtx();
    const pinned = isPinned(it);
    const menu = document.createElement('div');
    menu.className = 'ctx-menu';
    menu.innerHTML = '<div class="ctx-item" id="ctxPin">' +
        (pinned ? _STAR_OFF + 'Desafixar' : _STAR_FILL + 'Fixar no topo') + '</div>';
    document.body.appendChild(menu);
    // Clampa dentro da janela (menu nao pode vazar como o nativo)
    let x = e.clientX, y = e.clientY;
    const mw = menu.offsetWidth, mh = menu.offsetHeight;
    if (x + mw > window.innerWidth - 4) x = window.innerWidth - mw - 4;
    if (y + mh > window.innerHeight - 4) y = window.innerHeight - mh - 4;
    menu.style.left = Math.max(4, x) + 'px';
    menu.style.top = Math.max(4, y) + 'px';
    _ctxEl = menu;
    // Age no MOUSEDOWN: se qualquer listener global fechar o menu entre o down e o up,
    // o 'click' nunca dispararia no item removido — era por isso que "Fixar" nao fixava.
    var _ctxFired = false;
    function _doPin(ev) {
        if (_ctxFired) return;
        if (typeof ev.button === 'number' && ev.button !== 0) return; // so botao esquerdo
        _ctxFired = true;
        try { ev.preventDefault(); ev.stopPropagation(); } catch(e2) {}
        _hideCtx();
        togglePin(it);
    }
    menu.querySelector('#ctxPin').addEventListener('mousedown', _doPin);
    menu.querySelector('#ctxPin').addEventListener('click', _doPin); // backup (teclado/touch)
});
document.addEventListener('click', _hideCtx);
document.addEventListener('scroll', _hideCtx, true);
window.addEventListener('blur', _hideCtx);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && _ctxEl) { _hideCtx(); e.stopPropagation(); } }, true);
$results.addEventListener('mousemove', (e) => {
    const item = e.target.closest('.item');
    if (!item) return;
    const idx = parseInt(item.dataset.idx);
    if (idx !== selectedIdx) {
        selectedIdx = idx;
        const prev = $results.querySelector('.item.selected');
        if (prev) prev.classList.remove('selected');
        item.classList.add('selected');
    }
});

// UI OTIMISTA — toast breve, fecha janela, aplica em background.
// Mostra notification nativa Windows com resultado (sucesso ou erro).
async function apply() {
    if (busy) return;
    const it = flatList[selectedIdx];
    if (!it) return;
    busy = true;

    // Toast curto pra dar feedback visual
    const verb = it.kind === 'audio-source' ? 'Inserindo' : 'Aplicando';
    showToast(verb + ' ' + it.name + '…');

    // Fire-and-forget: dispara o apply em background
    ipcRenderer.invoke('lion-search:apply', {
        kind: it.kind, matchName: it.matchName, name: it.name,
    }).then(r => {
        const result = String(r?.result || '');
        const succeeded = !r?.error && result.startsWith('OK:');

        if (succeeded) {
            // Notificação de sucesso
            const successMsg = it.kind === 'audio-source' ? 'Inserido na timeline' : 'Aplicado no clip';
            try { ipcRenderer.send('lion-search:notify', { title: '✓ ' + it.name, body: successMsg, success: true }); } catch(e) {}
        } else {
            let msg = '';
            if (r?.error) msg = r.error;
            else if (result === 'NO_CLIP_SELECTED') msg = 'Selecione um clip na timeline primeiro';
            else if (result === 'NO_SEQUENCE') msg = 'Abra uma sequência no Premiere primeiro';
            else if (result.startsWith('ERR:transitions_not_implemented')) msg = 'Transições ainda não — arraste no plugin';
            else if (result.startsWith('ERR:preset_apply_failed') || result.startsWith('ERR:preset_apply_unsupported')) msg = 'Preset não pôde ser aplicado nessa versão de Premiere';
            else if (result.startsWith('ERR:audio_source_not_found')) msg = 'Áudio não encontrado no projeto';
            else if (result.startsWith('ERR:could_not_create_audio_track')) msg = 'Não consegui criar nova audio track';
            else if (result === 'ERR:duplicate_project_id') msg = 'Premiere tem o mesmo projeto aberto duas vezes — feche o duplicado';
            else if (result.startsWith('ERR:file_not_on_disk') || result.startsWith('ERR:sfx_file_not_on_disk')) msg = 'Arquivo não existe mais no disco';
            else msg = result || 'Erro ao aplicar';
            try { ipcRenderer.send('lion-search:notify', { title: '✗ ' + it.name, body: msg, success: false }); } catch(e) {}
        }
    }).catch(e => {
        try { ipcRenderer.send('lion-search:notify', { title: '✗ ' + it.name, body: e.message || String(e), success: false }); } catch(eS) {}
    });

    // Fecha quase instantâneo — notificação nativa cobre o feedback completo
    setTimeout(close, 60);
}

$input.addEventListener('input', filter);
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (selectedIdx < flatList.length - 1) { selectedIdx++; render(); }
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (selectedIdx > 0) { selectedIdx--; render(); }
    } else if (e.key === 'Enter') {
        e.preventDefault();
        apply();
    } else if (e.key === 'Escape') {
        e.preventDefault();
        if ($input.value) {
            $input.value = '';
            filter();
        } else {
            close();
        }
    }
});

window.addEventListener('blur', () => {
    setTimeout(() => { if (!document.hasFocus()) close(); }, 100);
});

// Boot — stale-while-revalidate:
//  1) Mostra cache instantaneamente (se houver)
//  2) Força refresh em background — quando vier fresh, atualiza
let lastJsxError = '';
let lastDebug = '';
let bootAttempts = 0;
async function fetchContext() {
    try {
        const ctx = await ipcRenderer.invoke('lion-search:get-context');
        if (ctx && !ctx.error) {
            selCtx = ctx;
            updateSelectionBadge();
        }
    } catch (e) {}
}
function updateSelectionBadge() {
    if (selCtx.selectionType === 'video') {
        $badge.title = (allItems.length + ' itens · ' + selCtx.videoSelected + ' clip vídeo selecionado');
    } else if (selCtx.selectionType === 'audio') {
        $badge.title = (allItems.length + ' itens · ' + selCtx.audioSelected + ' clip áudio selecionado');
    } else if (selCtx.selectionType === 'mixed') {
        $badge.title = (allItems.length + ' itens · ' + (selCtx.videoSelected + selCtx.audioSelected) + ' clips selecionados (mixed)');
    }
}

async function _applyResult(r, isFresh) {
    if (r?.error) {
        if (bootAttempts >= 3) bootError = r.error;
        updateBadge();
        // Força re-render do loading pra mostrar progresso da tentativa
        if ($input.value.trim()) render();
        return false;
    }
    const newItems = r.items || [];
    if (newItems.length === 0 && allItems.length > 0 && isFresh) {
        lastJsxError = r.jsxError || lastJsxError;
        lastDebug = r.debug || lastDebug;
        return true;
    }
    allItems = newItems;
    lastJsxError = r.jsxError || '';
    lastDebug = r.debug || '';
    booted = true;
    if (allItems.length === 0 && lastJsxError) {
        bootError = 'Premiere: ' + lastJsxError;
    } else if (allItems.length === 0 && bootAttempts >= 2) {
        bootError = 'Plugin retornou catálogo vazio. Abra o Premiere com plugin ativo + login.';
    } else if (allItems.length > 0) {
        bootError = null;
    }
    updateBadge();
    if ($input.value.trim()) filter(); else _renderPinsEmpty();
    ensureFocus();
    return true;
}

async function boot() {
    bootAttempts++;
    updateBadge();
    fetchContext();
    // Estratégia: 1) cache (instantâneo se existir). 2) Se cache vazio, força refresh.
    // Refresh "barato" (renames de projeto) fica pro setInterval em background.
    try {
        const cached = await ipcRenderer.invoke('lion-search:list-effects', { forceRefresh: false });
        await _applyResult(cached, false);
        // Se cache estava vazio, força refresh agora
        if (!cached.items || cached.items.length === 0) {
            try {
                const fresh = await ipcRenderer.invoke('lion-search:list-effects', { forceRefresh: true });
                await _applyResult(fresh, true);
            } catch (eF) {
                if (bootAttempts >= 3) bootError = eF.message || String(eF);
                updateBadge();
            }
        }
    } catch (e) {
        if (bootAttempts >= 3) bootError = e.message || String(e);
        updateBadge();
    }
}
boot();

// Re-fetch periódico — adapta interval baseado em ter cache ou não
let _refreshTimer = null;
function _scheduleRefresh() {
    if (_refreshTimer) clearInterval(_refreshTimer);
    // Catalogo de efeitos NATIVOS quase nunca muda em runtime -> refresh raro.
    // Cache vazio: 60s (plugin ainda carregando). Cheio: 5min (so pega sfx novos).
    // Antes era 3s/30s: o scan pesado (getAudio/VideoEffectList) roda na MESMA engine
    // ExtendScript do apply -> quase todo apply de efeito colidia com um scan em voo.
    const interval = (allItems.length === 0) ? 60000 : 300000;
    _refreshTimer = setInterval(async () => {
        if (busy) return;
        // Paleta escondida (fechada) nao precisa refazer scan — poupa a engine pro apply
        if (document.hidden) return;
        try {
            const r = await ipcRenderer.invoke('lion-search:list-effects', { forceRefresh: true });
            if (r) await _applyResult(r, true);
            // Se interval mudou (passou de empty pra populated ou vice-versa), reagenda
            const newInterval = (allItems.length === 0) ? 60000 : 300000;
            if (newInterval !== interval) _scheduleRefresh();
        } catch (e) {}
    }, interval);
}
_scheduleRefresh();
window.addEventListener('beforeunload', () => { try { clearInterval(_refreshTimer); } catch(e) {} });
</script>
